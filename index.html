DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mrzexx Utility App</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #fff; text-align: center; padding: 50px; }
h1 { color: #e94560; }
.container { background-color: #16213e; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; width: 300px; }
button { background-color: #0f3460; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
button:hover { background-color: #e94560; }
</style>
</head>
<body>
<h1>Mrzexx Utilities</h1>
<p>आपकी पसंदीदा बॉट सेवाएँ अब वेब ऐप पर।</p>

<div class="container">
<h3>Insta Check</h3>
<button>अभी चेक करें</button>
</div>

<div class="container">
  <div class="container">
  <h3>Movie Download</h3>
  <button>डाउनलोड करें</button>
  </div>

<h3>OTP Bypass</h3>
<button>सर्विस पाएँ</button>
</div>
  <script>
  const buttons = document.querySelectorAll('button');
  buttons.forEach(button => {
    button.addEventListener('click', function(e) {
      e.preventDefault();
      let instagramId = prompt("कृपया अपना Instagram User ID दर्ज करें:");
      if (instagramId) {
        alert("आपका ID '" + instagramId + "' दर्ज कर लिया गया है!");
      }
    });
  });
  </script>
</body>
</html>
