
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrzexx Utilities</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #16213e;
            color: #fff;
        }
        h1 {
            color: #e94560;
        }
        .container {
            background-color: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            background-color: #e94560;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff6b8b;
        }
        .download-btn {
            background-color: #ff4d4d;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .download-btn:hover {
            background-color: #e60000;
        }
    </style>
</head>
<body>
    <button class="download-btn">डाउनलोड करें</button>

    <h1>Mrzexx Utilities</h1>
    <p>आपकी पसंदीदा बॉट सेवाएँ अब वेब ऐप पर।</p>

    <div class="container">
        <h3>Insta Check</h3>
        <button id="insta-check-btn">अभी चेक करें</button>
    </div>

    <div class="container">
        <h3>Movie Download</h3>
        <button id="movie-download-btn">डाउनलोड करें</button>
    </div>

    <div class="container">
        <h3>OTP Bypass</h3>
        <button id="otp-bypass-btn">सर्विसेज पाएँ</button>
    </div>

    <div class="container">
        <h3>All in One</h3>
        <button id="all-in-one-btn">अभी देखें</button>
    </div>
</body>
</html>
